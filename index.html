<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Device Tracking App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- SheetJS for Excel Parsing -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">

    <!-- LOGIN VIEW -->
    <div id="view-login" class="view card text-center">
      <h1 class="mb-6">Device Tracking App</h1>
      <form id="login-form">
        <div class="form-group text-left" style="text-align: left;">
          <label for="username">Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group text-left" style="text-align: left;">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-primary btn-block mt-4">Login</button>
      </form>
    </div>

    <!-- PAGE SELECT VIEW -->
    <div id="view-page-select" class="view hidden card text-center">
      <h1 class="mb-6">Choose a Page</h1>
      <div class="button-grid">
        <button id="btn-page-total" class="btn-primary">Total Devices</button>
        <button id="btn-page-level" class="btn-primary">Level Devices</button>
        <button id="btn-logout-1" class="btn-danger mt-4">Logout</button>
      </div>
    </div>

    <!-- TRACKER VIEW -->
    <div id="view-tracker" class="view hidden">
      <div style="display: flex; justify-content: space-between; align-items: center;" class="mb-6">
        <h1 id="tracker-title">Device Tracking</h1>
        <div>
          <button id="btn-back-to-select" class="btn-outline" style="margin-right: 8px;">Back</button>
          <button id="btn-logout-2" class="btn-danger">Logout</button>
        </div>
      </div>

      <!-- Add Device Form -->
      <div class="card">
        <h2 class="mb-4">Add or Import Devices</h2>
        <form id="add-device-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="dev-serial">Serial Number</label>
              <input type="text" id="dev-serial" required>
            </div>
            <div class="form-group">
              <label for="dev-type">Type</label>
              <input type="text" id="dev-type" required>
            </div>
            <div class="form-group">
              <label for="dev-set">Set / Brand</label>
              <input type="text" id="dev-set" required>
            </div>
            <div class="form-group">
              <label for="dev-model">Model</label>
              <input type="text" id="dev-model" required>
            </div>
            <div class="form-group">
              <label for="dev-cal-date">Latest Calibration Date</label>
              <input type="date" id="dev-cal-date" required>
            </div>
            <div class="form-group">
              <label for="dev-location">Current Location</label>
              <select id="dev-location" required>
                <option value="">Select Location</option>
              </select>
              <div id="dev-loc-other-container" class="dynamic-input-container hidden">
                <input type="text" id="dev-loc-other" placeholder="Enter new location">
                <button type="button" id="btn-add-loc-new" class="btn-success">Add</button>
              </div>
            </div>
          </div>
          <!-- Custom column fields – injected by JS -->
          <div class="form-grid" id="custom-fields-add"></div>
          <button type="submit" class="btn-primary mt-4">Add Device Manually</button>
        </form>

        <div class="upload-container">
          <label for="excel-upload" style="margin: 0;"><strong>Bulk Upload (Excel):</strong></label>
          <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" style="border: none; padding: 0;">
          <button type="button" id="btn-process-excel" class="btn-success hidden">Process File</button>
          <span id="upload-status" style="margin-left: 10px; font-size: 0.9rem; color: var(--text-muted);"></span>
        </div>
      </div>

      <!-- Search & Sort Actions -->
      <div class="card top-actions">
        <div class="search-box">
          <label for="search-input">Search Devices</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="search-input" placeholder="Search by Serial, Model, etc...">
            <button id="btn-clear-search" class="btn-outline">Clear</button>
          </div>
        </div>
        <div class="sort-box">
          <button id="btn-sort" class="btn-primary btn-block" style="height: 42px;">Sort: Ascending</button>
        </div>
        <div class="export-box">
          <button id="btn-export-excel" class="btn-success btn-block" style="height: 42px;">Export to Excel</button>
        </div>
        <div class="add-col-box">
          <button id="btn-add-column" class="btn-outline btn-block" style="height: 42px;">＋ Add Column</button>
        </div>
      </div>

      <!-- Device Data Table -->
      <div class="table-responsive">
        <table id="device-table">
          <thead>
            <!-- Headers injected by JS (renderTableHeaders) -->
          </thead>
          <tbody id="device-table-body">
            <!-- Devices injected by JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- History / Move Modal -->
  <div id="modal-history" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-device-name">Move History</h2>
        <button id="btn-close-modal" class="modal-close">&times;</button>
      </div>
      <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);">
        <h4>Add New Move</h4>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
          <input type="hidden" id="modal-device-id">
          <div style="flex: 1; min-width: 150px;">
            <label>Move Date</label>
            <input type="date" id="modal-move-date">
          </div>
          <div style="flex: 1; min-width: 150px;">
            <label>New Location (To)</label>
            <select id="modal-move-to"></select>
          </div>
          <div style="display: flex; align-items: flex-end;">
            <button class="btn-success" id="btn-submit-move">Save Move</button>
          </div>
        </div>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="modal-edit" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-edit-title">Edit Device</h2>
        <button id="btn-close-edit-modal" class="modal-close">&times;</button>
      </div>
      <form id="edit-device-form">
        <input type="hidden" id="edit-dev-id">
        <div class="form-grid">
          <div class="form-group">
            <label for="edit-dev-serial">Serial Number</label>
            <input type="text" id="edit-dev-serial" required>
          </div>
          <div class="form-group">
            <label for="edit-dev-type">Type</label>
            <input type="text" id="edit-dev-type" required>
          </div>
          <div class="form-group">
            <label for="edit-dev-set">Set / Brand</label>
            <input type="text" id="edit-dev-set" required>
          </div>
          <div class="form-group">
            <label for="edit-dev-model">Model</label>
            <input type="text" id="edit-dev-model" required>
          </div>
          <div class="form-group">
            <label for="edit-dev-cal-date">Latest Calibration Date</label>
            <input type="date" id="edit-dev-cal-date" required>
          </div>
          <div class="form-group">
            <label for="edit-dev-location">Current Location</label>
            <select id="edit-dev-location" required>
              <option value="">Select Location</option>
            </select>
          </div>
        </div>
        <!-- Custom column fields – injected by JS -->
        <div class="form-grid" id="custom-fields-edit"></div>
        <button type="submit" class="btn-primary mt-4">Save Changes</button>
      </form>
    </div>
  </div>

  <footer class="app-footer">
    <p>&copy; <span id="current-year"></span> Device Tracking App</p>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
